name: 'ProductNow Action'
description: 'Says Hello world!'
inputs:
  openai_api_key:
    description: 'OpenAI API key'
    required: true
  mcp_url:
    description: 'MCP server URL'
    required: true
  mcp_key:
    description: 'MCP API key'
    required: true
  interval_hours:
    description: 'Interval, in hours, between runs'
    required: false
    default: '3'
  instructions_doc_id:
    description: 'ID of the instructions document'
    required: true
  write_folder_id:
    description: 'ID of the folder to write output to'
    required: false
runs:
  using: 'composite'
  steps:
    - shell: bash
      run: echo "Hello world!"
