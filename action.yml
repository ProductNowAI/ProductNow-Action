name: 'ProductNow Action'
description: 'Generic ProductNow Action'
inputs:
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  mcp_url:
    description: 'MCP server URL'
    required: true
  mcp_key:
    description: 'MCP API key'
    required: true
  task:
    description: 'Task for the action to perform'
    required: true
  interval_hours:
    description: 'Interval, in hours, between runs'
    required: false
    default: '3'
runs:
  using: 'composite'
  steps:
    - id: install_claude_code
      shell: bash
      run: npm install -g @anthropic-ai/claude-code

    # TASK 1: UPDATE RTFM
    - id: update_rtfm
      if: inputs.task == 'update_rtfm'
      shell: bash
      run: |
        UPDATE_PROMPT_FILE="${{ github.action_path }}/prompts/UPDATE.md" \
          INTERVAL_HOURS="${{ inputs.interval_hours }}" \
          "${{ github.action_path }}/scripts/update_documentation.sh"
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        MCP_URL: ${{ inputs.mcp_url }}
        MCP_KEY: ${{ inputs.mcp_key }}
