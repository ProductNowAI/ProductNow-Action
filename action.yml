name: 'ProductNow Action'
description: 'Generic ProductNow Action'
inputs:
  anthropic_api_key:
    description: 'Anthropic API key'
    required: true
  mcp_url:
    description: 'MCP server URL'
    required: true
  mcp_key:
    description: 'MCP API key'
    required: true
  task:
    description: 'Task for the action to perform'
    required: true
  interval_hours:
    description: 'Interval, in hours, between runs'
    required: false
    default: '3'
runs:
  using: 'composite'
  steps:
    # TASK 1: UPDATE RTFM
    - id: update_rtfm
      if: inputs.task == 'update_rtfm'
      shell: bash
      run: |
        SINCE_SHA=$(git rev-list -1 --before="${{ inputs.interval_hours }} hours ago" HEAD)
        if [ -z "$SINCE_SHA" ]; then
          echo "No commit found before the interval window; skipping."
          exit 0
        fi
        git diff "$SINCE_SHA" HEAD > "$RUNNER_TEMP/diff.patch"
        if [ -s "$RUNNER_TEMP/diff.patch" ]; then
          DIFF_FILE="$RUNNER_TEMP/diff.patch" "${{ github.action_path }}/scripts/update_documentation.sh"
        else
          echo "No changes since the interval window; skipping."
        fi
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
        MCP_URL: ${{ inputs.mcp_url }}
        MCP_KEY: ${{ inputs.mcp_key }}
